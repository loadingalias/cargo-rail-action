name: Test Action

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call: # Allow other workflows to call this

jobs:
  lint-action-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate action.yaml
        run: ruby -ryaml -e 'YAML.load_file("action.yaml")'

  fixture-tests:
    needs: lint-action-yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run summary fixture tests
        run: ./tests/test_summary.sh
      - name: Run history fixture tests
        run: bash ./tests/test_ensure_history.sh

  # ============================================================================
  # Self-test: Create minimal workspace, no external dependencies
  # ============================================================================
  self-test:
    needs: [lint-action-yaml, fixture-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create test workspace
        run: |
          mkdir -p test-workspace/crates/{core,api,cli}

          # Root Cargo.toml
          cat > test-workspace/Cargo.toml << 'EOF'
          [workspace]
          members = ["crates/*"]
          resolver = "2"
          EOF

          # Core crate
          cat > test-workspace/crates/core/Cargo.toml << 'EOF'
          [package]
          name = "test-core"
          version = "0.1.0"
          edition = "2021"
          EOF
          mkdir -p test-workspace/crates/core/src
          echo 'pub fn core() {}' > test-workspace/crates/core/src/lib.rs

          # API crate (depends on core)
          cat > test-workspace/crates/api/Cargo.toml << 'EOF'
          [package]
          name = "test-api"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          test-core = { path = "../core" }
          EOF
          mkdir -p test-workspace/crates/api/src
          echo 'pub fn api() { test_core::core(); }' > test-workspace/crates/api/src/lib.rs

          # CLI crate (depends on api)
          cat > test-workspace/crates/cli/Cargo.toml << 'EOF'
          [package]
          name = "test-cli"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          test-api = { path = "../api" }
          EOF
          mkdir -p test-workspace/crates/cli/src
          echo 'fn main() { test_api::api(); }' > test-workspace/crates/cli/src/main.rs

          # Initialize git
          cd test-workspace
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          git add -A
          git commit -m "initial"

          # Make a change to core
          echo '// change' >> crates/core/src/lib.rs
          git add -A
          git commit -m "modify core"

      - name: Run action
        id: rail
        uses: ./
        with:
          mode: debug
          checksum: if-available
          since: HEAD~1
          working-directory: test-workspace

      - name: Verify outputs
        run: |
          echo "=== Outputs ==="
          echo "build: ${{ steps.rail.outputs.build }}"
          echo "test: ${{ steps.rail.outputs.test }}"
          echo "scope-json: ${{ steps.rail.outputs.scope-json }}"
          echo "plan-json: ${{ steps.rail.outputs.plan-json }}"

          [[ "${{ steps.rail.outputs.build }}" == "true" ]] || { echo "expected build=true"; exit 1; }
          [[ "${{ steps.rail.outputs.test }}" == "true" ]] || { echo "expected test=true"; exit 1; }
          echo '${{ steps.rail.outputs.scope-json }}' | jq . || { echo "scope-json not valid JSON"; exit 1; }
          echo '${{ steps.rail.outputs.plan-json }}' | jq . || { echo "plan-json not valid JSON"; exit 1; }
          [[ -n "${{ steps.rail.outputs.base-ref }}" ]] || { echo "base-ref missing"; exit 1; }

          echo "Self-test passed!"

  # ============================================================================
  # Real monorepo test: tokio
  # ============================================================================
  test-monorepo:
    needs: [lint-action-yaml, fixture-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Clone test repo (tokio)
        run: |
          git clone --depth 100 https://github.com/tokio-rs/tokio.git test-repo
          cd test-repo
          git log --oneline -5

      - name: Run action
        id: rail
        uses: ./
        with:
          mode: minimal
          checksum: if-available
          since: HEAD~10
          working-directory: test-repo

      - name: Verify outputs
        run: |
          echo "=== Outputs ==="
          echo "scope-json: ${{ steps.rail.outputs.scope-json }}"
          echo "build: ${{ steps.rail.outputs.build }}"
          echo "test: ${{ steps.rail.outputs.test }}"

          echo '${{ steps.rail.outputs.scope-json }}' | jq . || { echo "scope-json not valid JSON"; exit 1; }
          [[ -n "${{ steps.rail.outputs.base-ref }}" ]] || { echo "base-ref missing"; exit 1; }
          [[ -z "${{ steps.rail.outputs.plan-json }}" ]] || { echo "plan-json should be empty in minimal mode"; exit 1; }

          echo "Monorepo test passed!"

  # ============================================================================
  # Multi-platform test
  # ============================================================================
  test-platforms:
    needs: [lint-action-yaml, fixture-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Clone test repo
        shell: bash
        run: git clone --depth 50 https://github.com/tokio-rs/tokio.git test-repo

      - name: Run action
        id: rail
        uses: ./
        with:
          mode: minimal
          checksum: if-available
          since: HEAD~5
          working-directory: test-repo

      - name: Verify
        shell: bash
        run: |
          echo "Platform: ${{ matrix.os }}"
          echo "Scope JSON: ${{ steps.rail.outputs.scope-json }}"
          echo '${{ steps.rail.outputs.scope-json }}' | jq . >/dev/null || exit 1
          echo "Platform test passed!"
